<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="2026-04-23-v2">
<title>Tailored Engenharia — Acesso à Obra</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1C3D5A;--navy-dark:#122738;--navy-light:#2A5580;
  --teal:#1A7A9A;--teal-light:#D6EEF6;
  --green:#1A8A55;--green-bg:#E8F5EE;
  --red:#C0392B;--red-bg:#FDECEA;
  --border:#D0DDE8;--bg:#EDF2F7;--white:#FFFFFF;
  --text:#1A2D3D;--muted:#6B8296;
}
html,body{overflow-x:hidden;height:100%}
body{
  font-family:'Poppins',system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(ellipse at top left,rgba(26,122,154,.18),transparent 55%),
    radial-gradient(ellipse at bottom right,rgba(42,85,128,.25),transparent 55%),
    linear-gradient(135deg,var(--navy-dark),var(--navy) 60%,var(--navy-light));
  display:flex;align-items:center;justify-content:center;
  padding:24px;color:var(--text);-webkit-font-smoothing:antialiased;
  animation:fade .6s ease both;
}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}

.card{
  background:#fff;border-radius:14px;
  box-shadow:0 24px 80px rgba(0,0,0,.35),0 4px 12px rgba(0,0,0,.15);
  width:100%;max-width:460px;overflow:hidden;
  animation:slideUp .55s cubic-bezier(.2,.7,.3,1) both;
}
.top{
  background:var(--navy-dark);padding:26px 28px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.logo{
  width:48px;height:48px;border-radius:8px;
  background:linear-gradient(135deg,var(--teal),var(--navy-light));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;
  letter-spacing:1px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.brand-block{display:flex;flex-direction:column;gap:3px;min-width:0}
.brand-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:3.5px;text-transform:uppercase;line-height:1}
.brand-tag{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:1.8px;text-transform:uppercase}

.body{padding:32px 28px 26px}
.title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3}
.sub{font-size:12.5px;color:var(--muted);margin-bottom:22px;line-height:1.5}

.field-lbl{
  display:block;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;
  font-weight:600;color:var(--muted);margin-bottom:8px;
}
.input-wrap{position:relative}
.input{
  width:100%;padding:14px 16px;font-size:17px;font-weight:600;
  font-family:'Poppins',sans-serif;color:var(--text);
  border:2px solid var(--border);border-radius:8px;
  letter-spacing:2px;text-transform:uppercase;text-align:center;
  background:#FAFCFE;transition:all .2s;outline:none;
}
.input:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 4px rgba(26,122,154,.12)}
.input.error{border-color:var(--red);background:var(--red-bg);animation:shake .35s ease}

.hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
.hint.err{color:var(--red);font-weight:500}

.btn{
  width:100%;margin-top:18px;padding:13px;font-size:13px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:#fff;
  background:linear-gradient(135deg,var(--teal),var(--navy-light));
  border:none;border-radius:8px;cursor:pointer;
  font-family:'Poppins',sans-serif;transition:all .2s;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 20px rgba(26,122,154,.35)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

.divider{
  display:flex;align-items:center;gap:12px;margin:26px 0 18px;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:500;
}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}

.admin-link{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px;font-size:12px;font-weight:500;color:var(--navy);
  background:var(--gray-bg,#F4F7FA);border:1px solid var(--border);
  border-radius:8px;text-decoration:none;transition:all .2s;
}
.admin-link:hover{border-color:var(--navy);background:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}

.footer{
  padding:16px 28px;background:#FAFCFE;border-top:1px solid var(--border);
  font-size:10px;color:var(--muted);text-align:center;letter-spacing:.5px;
}

.status-bar{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--navy-dark);color:#fff;padding:8px 18px;border-radius:20px;
  font-size:11px;font-weight:500;letter-spacing:.5px;
  box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;
  display:flex;align-items:center;gap:8px;pointer-events:none;
}
.status-bar.show{opacity:1}
.status-bar .dot{width:7px;height:7px;border-radius:50%;background:#69F0AE;box-shadow:0 0 8px rgba(105,240,174,.6)}
.status-bar.offline .dot{background:#FFD54F}
.status-bar.error .dot{background:#FF8A80}
</style>
</head>
<body>

<div class="card">
  <div class="top">
    <div class="logo">T</div>
    <div class="brand-block">
      <div class="brand-name">Tailored</div>
      <div class="brand-tag">Engenharia</div>
    </div>
  </div>

  <div class="body">
    <div class="title">Acesso à obra</div>
    <div class="sub">Digite o código que você recebeu para acompanhar o cronograma da sua obra em tempo real.</div>

    <label class="field-lbl" for="code">Código de acesso</label>
    <div class="input-wrap">
      <input id="code" class="input" type="text" placeholder="CÓDIGO" maxlength="20" autocomplete="off" spellcheck="false">
    </div>
    <div id="hint" class="hint">Digite o código de acesso fornecido pela Tailored.</div>

    <button id="enter" class="btn">
      <span id="btn-label">Entrar na obra</span>
    </button>

    <div class="divider">Ou</div>

    <a class="admin-link" href="admin.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      Acesso administrativo
    </a>
  </div>

  <div class="footer">Tailored Engenharia · Sistema de acompanhamento de obras</div>
</div>

<div id="status-bar" class="status-bar"><span class="dot"></span><span id="status-text">Conectando…</span></div>

<!-- Firebase -->
<script type="module">
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBJoDou1VsHAIAbVjESOGVh23dezmLETrE",
  authDomain: "franco-e-fragoso-advocacia.firebaseapp.com",
  databaseURL: "https://franco-e-fragoso-advocacia-default-rtdb.firebaseio.com",
  projectId: "franco-e-fragoso-advocacia",
  storageBucket: "franco-e-fragoso-advocacia.firebasestorage.app",
  messagingSenderId: "1096895063248",
  appId: "1:1096895063248:web:68a5c866e229124f3faad5"
};

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);

window.__TAILORED__ = { db, ref, get };
window.dispatchEvent(new CustomEvent('fb-ready'));
</script>

<script>
const codeInput = document.getElementById('code');
const btn = document.getElementById('enter');
const btnLabel = document.getElementById('btn-label');
const hint = document.getElementById('hint');
const statusBar = document.getElementById('status-bar');
const statusText = document.getElementById('status-text');

function setStatus(text, kind) {
  statusText.textContent = text;
  statusBar.className = 'status-bar show' + (kind ? ' ' + kind : '');
  clearTimeout(setStatus._t);
  setStatus._t = setTimeout(() => statusBar.classList.remove('show'), 2400);
}

function setHint(text, err) {
  hint.textContent = text;
  hint.className = 'hint' + (err ? ' err' : '');
}

function setLoading(loading) {
  btn.disabled = loading;
  if (loading) {
    btnLabel.innerHTML = '<span class="spin"></span>&nbsp;Verificando…';
  } else {
    btnLabel.textContent = 'Entrar na obra';
  }
}

// Normaliza código: maiúsculas, remove espaços internos, permite hífen
function normalize(raw) {
  return (raw || '').trim().toUpperCase().replace(/\s+/g,'');
}

// Auto-uppercase no input
codeInput.addEventListener('input', (e) => {
  const pos = e.target.selectionStart;
  e.target.value = e.target.value.toUpperCase();
  e.target.setSelectionRange(pos, pos);
  e.target.classList.remove('error');
});

codeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); onEnter(); }
});

btn.addEventListener('click', onEnter);

async function onEnter() {
  const code = normalize(codeInput.value);
  if (!code) {
    codeInput.classList.add('error');
    setHint('Digite um código para continuar', true);
    codeInput.focus();
    return;
  }
  if (!window.__TAILORED__) {
    setHint('Conectando ao servidor, tente novamente em instantes…', true);
    return;
  }

  setLoading(true);
  setHint('Verificando código…', false);

  try {
    const { db, ref, get } = window.__TAILORED__;
    // codes/<CODIGO> -> { obraId: "...", ativo: true }
    const snap = await get(ref(db, 'codes/' + code));
    const data = snap.val();
    if (!data || !data.obraId || data.ativo === false) {
      codeInput.classList.add('error');
      setHint('Código não encontrado ou desativado. Verifique com a Tailored.', true);
      setLoading(false);
      return;
    }
    setStatus('Acesso liberado', '');
    // Guarda código usado por conveniência
    try { sessionStorage.setItem('tailored_last_code', code); } catch(e){}
    window.location.href = `obra.html?id=${encodeURIComponent(data.obraId)}&code=${encodeURIComponent(code)}`;
  } catch (err) {
    console.error(err);
    setHint('Erro de conexão. Tente novamente.', true);
    setStatus('Sem conexão', 'error');
    setLoading(false);
  }
}

// Pré-preenche se veio com ?code= na URL (útil pra QR code / link direto)
const urlCode = new URLSearchParams(window.location.search).get('code');
if (urlCode) {
  codeInput.value = urlCode.toUpperCase();
  setTimeout(onEnter, 400);
}

window.addEventListener('fb-ready', () => {
  setStatus('Conectado', '');
});
</script>

</body>
</html>
